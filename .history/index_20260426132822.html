<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star network</title>
    <script src="cytoscape.min.js"></script>
</head>
<body>
  <div id="cy"></div>

  <script>
    const nodes = [
      { data: { id: "1", label: "Project A", type: "essay" } },
      { data: { id: "2", label: "Tool B", type: "tool" } }
    ];

    const edges = [
      { data: { source: "1", target: "2", label: "influences" } }
    ];

    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements: [...nodes, ...edges],
      style: [
        {
          selector: 'node',
          style: {
            'label': 'data(label)',
            'background-color': '#666'
          }
        },
        {
          selector: 'edge',
          style: {
            'label': 'data(label)',
            'width': 2,
            'line-color': '#ccc'
          }
        }
      ],
      layout: { name: 'cose' }
    });
  </script>
</body>
</html>
