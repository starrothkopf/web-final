<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
  <style>
    #cy { width: 100%; height: 100vh; display: block; }
  </style>
</head>
<body>
  <div id="cy"></div>

  <script>
    const nodes = [
      { data: { id: "1", label: "Project A", type: "essay" } },
      { data: { id: "2", label: "Tool B", type: "tool" } }
    ];

    const edges = [
      { data: { source: "1", target: "2", label: "influences" } }
    ];

    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements: [...nodes, ...edges],
      style: [
        {
          selector: 'node',
          style: {
            'label': 'data(label)',
            'background-color': '#666'
          }
        },
        {
          selector: 'edge',
          style: {
            'label': 'data(label)',
            'width': 2,
            'line-color': '#ccc'
          }
        }
      ],
      layout: { name: 'cose' }
    });
  </script>
</body>
</html>
